# Ensure that the client pods remain Running and do not crash when processing the alumet-config.toml
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-alumet-relay-client-test-connection"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Release.Name }}-alumet-relay-client-test-sa
  containers:
    - name: check
      image: bitnami/kubectl:latest
      command:
        - /bin/sh
        - -c
        - |
          set -e

          NAMESPACE="{{ .Release.Namespace }}"
          SELECTOR="app.kubernetes.io/name=alumet-relay-client"
          STABLE_SECONDS=5
          TIMEOUT=60

          echo "Waiting for all DaemonSet pods to become Ready..."
          kubectl wait pod \
            -l "$SELECTOR" \
            --for=condition=Ready \
            --timeout="${TIMEOUT}s" \
            -n "$NAMESPACE"

          echo "All pods Ready. Verifying stability for ${STABLE_SECONDS}s..."
          ELAPSED=0
          while [ $ELAPSED -lt $STABLE_SECONDS ]; do

            # Check every pod's phase
            NOT_RUNNING=$(kubectl get pods \
              -l "$SELECTOR" \
              --field-selector "status.phase!=Running" \
              -n "$NAMESPACE" || true)

            if [ -n "$NOT_RUNNING" ]; then
              echo "FAIL: Some pods are not Running at ${ELAPSED}s: $NOT_RUNNING"
              kubectl get pods -l "$SELECTOR" -n "$NAMESPACE" --field-selector "status.phase!=Running"
              exit 1
            fi

            # Check restart count across ALL pods
            RESTARTS=$(kubectl get pods \
              -l "$SELECTOR" \
              -n "$NAMESPACE" \
              -o jsonpath='{.items[*].status.containerStatuses[*].restartCount}' \
              | tr ' ' '\n' \
              | awk '{s+=$1} END {print s}')

            if [ "${RESTARTS:-0}" -gt "0" ]; then
              echo "FAIL: Total restart count across all pods is ${RESTARTS}"
              kubectl get pods -l "$SELECTOR" -n "$NAMESPACE"
              exit 1
            fi

            sleep 1
            ELAPSED=$((ELAPSED + 1))
          done

          echo "SUCCESS: All pods remained Running for ${STABLE_SECONDS}s with 0 restarts"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-alumet-relay-client-test-sa
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-alumet-relay-client-test-pod-reader
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-2"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-alumet-relay-client-test-pod-reader
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-alumet-relay-client-test-pod-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-alumet-relay-client-test-sa
    namespace: {{ .Release.Namespace }}